name: ai_buddy
description: AI Companion App with Chat, Voice, Memory, Persona & Tool System
publish_to: 'none'
version: 0.78.2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  provider: ^6.1.0
  flutter_dotenv: ^5.1.0
  archive: ^3.4.0
  uuid: ^4.2.0
  intl: ^0.19.0
