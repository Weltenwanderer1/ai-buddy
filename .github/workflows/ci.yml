name: CI

on:
  push:
    branches: [master, main, 'claude/**']
    tags: ['v*']          # Version-Tags lösen den APK-Release aus
  pull_request:
  workflow_dispatch:      # APK auch manuell baubar (Actions → Run workflow)

jobs:
  check:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          # piper_tts_plugin verlangt Dart >= 3.10 → Flutter >= 3.44
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-apk:
    name: Build & Release APK
    runs-on: ubuntu-latest
    needs: check
    # Läuft nur bei Version-Tags (→ GitHub-Release) oder manuell (→ Artifact).
    # NICHT bei jedem Push, damit Actions-Minuten/Speicher geschont werden.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write     # nötig, um ein GitHub-Release anzulegen
    env:
      # Aus den verschlüsselten Repo-Secrets. Sind sie NICHT gesetzt, bleibt
      # KEYSTORE_BASE64 leer → der Signing-Schritt wird übersprungen → Build
      # fällt auf den Debug-Key zurück (Repo bleibt ohne Secrets baubar).
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Release-Signierung NUR wenn die Secrets hinterlegt sind. Keystore +
      # key.properties werden zur Build-Zeit erzeugt und liegen nie im Repo.
      - name: Set up release signing
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=app/upload-keystore.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          echo "Release-Signierung aktiv."

      # Ohne android/key.properties fällt die Signierung automatisch auf den
      # Debug-Key zurück (build.gradle) — die APK ist trotzdem per Sideload
      # installierbar, ohne dass Keys/Secrets nötig sind.
      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p dist
          NAME="ai-buddy-${GITHUB_REF_NAME//\//-}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "dist/$NAME"
          echo "APK_PATH=dist/$NAME" >> "$GITHUB_ENV"

      # Manueller Lauf: APK als 14-Tage-Artifact
      - name: Upload APK artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ai-buddy-apk
          path: dist/*.apk
          retention-days: 14

      # Tag-Lauf: APK an ein GitHub-Release hängen (dauerhafter Download)
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          body: |
            Automatisch gebaute Debug-signierte APK für ${{ github.ref_name }}.

            > Zum Installieren „Unbekannte Quellen" für deinen Browser/Dateimanager erlauben.
            > Diese APK ist **nicht** für den Play Store signiert.
