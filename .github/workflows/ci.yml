name: CI

on:
  push:
    branches: [master, main, 'claude/**']
    tags: ['v*']          # Version tags trigger APK release
  pull_request:
  workflow_dispatch:      # APK can also be built manually (Actions → Run workflow)

jobs:
  check:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          # piper_tts_plugin requires Dart >= 3.10 → Flutter >= 3.44
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-apk:
    name: Build & Release APK
    runs-on: ubuntu-latest
    needs: check
    # Only runs on version tags (→ GitHub Release) or manual dispatch (→ Artifact).
    # NOT on every push, to save Actions minutes/storage.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write     # required to create a GitHub Release
    env:
      # From encrypted repo secrets. If NOT set, KEYSTORE_BASE64 stays empty
      # → signing step is skipped → build falls back to debug key
      # (repo remains buildable without secrets).
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Release signing ONLY when secrets are set. Keystore + key.properties
      # are created at build time and never stored in the repo.
      - name: Set up release signing
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=app/upload-keystore.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          echo "Release signing enabled."

      # Without android/key.properties, signing automatically falls back to
      # the debug key (build.gradle) — the APK is still sideloadable without
      # any keys/secrets required.
      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p dist
          NAME="ai-buddy-${GITHUB_REF_NAME//\//-}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "dist/$NAME"
          echo "APK_PATH=dist/$NAME" >> "$GITHUB_ENV"

      # Manual run: APK as 14-day artifact
      - name: Upload APK artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ai-buddy-apk
          path: dist/*.apk
          retention-days: 14

      # Tag push: attach APK to a GitHub Release (permanent download)
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          body: |
            Auto-built debug-signed APK for ${{ github.ref_name }}.

            > To install, enable "Install from unknown sources" for your browser/file manager.
            > This APK is **not** Play Store signed.