# Heap auf 4G begrenzt: GitHubs ubuntu-latest-Runner haben nur ~7 GB RAM
# total. -Xmx8G (vorher) überstieg das physische RAM → Swapping → der
# APK-Build hing minutenlang. 4G reicht für den Flutter+Firebase-Build und
# funktioniert lokal wie in der CI.
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
